<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IMS | 2FA Verification</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { 
            background-color: #f0f2f5; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Segoe UI', sans-serif;
        }
        .otp-card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 380px;
            text-align: center;
        }
        .otp-input {
            letter-spacing: 12px;
            font-size: 2rem !important;
            font-weight: 700 !important;
            border: 2px solid #dee2e6;
            border-radius: 12px;
        }
        .otp-input:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1);
        }
        .btn-verify {
            padding: 12px;
            font-weight: 600;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="otp-card">
        <div class="text-center mb-4">
            <div class="display-6 mb-2">🔐</div>
            <h3 class="fw-bold">Security Check</h3>
            <p class="text-muted small">We've generated a unique code for <strong>{{ username }}</strong>. Check your Python terminal to continue.</p>
        </div>

        <form action="/verify-otp" method="post">
            <input type="hidden" name="username" value="{{ username }}">
            
            <div class="mb-4">
                <input type="text" 
                       name="otp_input" 
                       class="form-control text-center otp-input" 
                       placeholder="000000" 
                       maxlength="6" 
                       pattern="\d{6}" 
                       inputmode="numeric"
                       required 
                       autofocus>
                <div class="form-text text-center mt-3">
                    Code expires if the server restarts.
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-verify">Verify & Open Dashboard</button>
            
            <div class="text-center mt-4">
                <a href="/logout" class="text-decoration-none small">Cancel and Go Back</a>
            </div>
        </form>
    </div>

</body>
</html>
